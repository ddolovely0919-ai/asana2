<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제작 물량 통합 트래킹 대시보드 (SS DB 통합)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #4e73df; --bg: #f4f7fc; --card: #ffffff; --excel: #217346; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1500px; margin: auto; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .config-grid { display: flex; justify-content: space-between; align-items: flex-end; gap: 20px; flex-wrap: wrap; }
        .filter-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; flex-grow: 1; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; font-weight: bold; color: #666; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 14px; color: white; }
        .btn-sync { background: var(--primary); }
        .btn-excel { background: var(--excel); }
        .dashboard-row { display: grid; grid-template-columns: 2.3fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-container { height: 450px; position: relative; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
        th { background: #f8f9fc; color: var(--primary); font-weight: 700; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 5px; background: #eef2ff; color: var(--primary); font-weight: bold; }
        #status { font-weight: bold; margin-top: 15px; font-size: 14px; padding: 10px; border-radius: 8px; background: #fff; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 style="margin-top:0;">📊 제작 물량 통합 트래킹 (스프레드시트 DB형)</h2>
        <div class="config-grid">
            <div class="filter-inputs">
                <div class="input-group"><label>팀 필터</label><select id="teamSelect" onchange="processAndRender()"><option value="all">전체 팀</option></select></div>
                <div class="input-group"><label>캠페인 필터</label><select id="campaignSelect" onchange="processAndRender()"><option value="all">전체 캠페인</option></select></div>
                <div class="input-group"><label>시작일</label><input type="date" id="startDate" onchange="processAndRender()"></div>
                <div class="input-group"><label>종료일</label><input type="date" id="endDate" onchange="processAndRender()"></div>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn-sync" onclick="loadSheetData()">🔄 DB 데이터 동기화</button>
                <button class="btn-excel" onclick="exportToExcel()">📥 Excel 다운로드</button>
            </div>
        </div>
        <div id="status">연동 대기 중...</div>
    </div>

    <div class="dashboard-row">
        <div class="card"><h2>📈 제작 요청 추이</h2><div class="chart-container"><canvas id="dailyChart"></canvas></div></div>
        <div class="card"><h2>🏢 팀별 요약</h2><table><thead><tr><th>팀명</th><th>건수</th></tr></thead><tbody id="teamTableBody"></tbody></table></div>
    </div>

    <div class="card">
        <h2>📊 캠페인/매체별 세부 분석</h2>
        <table id="campaignTable">
            <thead><tr><th>캠페인명</th><th>총 건수</th><th>구글</th><th>메타</th><th>카카오</th><th>유튜브</th><th>네이버</th><th>기타</th></tr></thead>
            <tbody id="campaignTableBody"></tbody>
        </table>
    </div>
</div>

<script>
Chart.register(ChartDataLabels);
const SHEET_ID = '1lx3nUPiUlBXcZAOktrTQ87Dm0amoQw1O-iVvBAGGiN4';
let allRawData = [];
let dailyChart;

window.onload = () => {
    // 기본 날짜 범위를 아주 넓게 설정 (데이터 유무 확인용)
    const now = new Date();
    const firstDay = new Date(now.getFullYear(), now.getMonth() - 1, 1).toISOString().split('T')[0]; // 지난 달부터
    const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString().split('T')[0];
    document.getElementById('startDate').value = firstDay;
    document.getElementById('endDate').value = lastDay;
    loadSheetData();
};

async function loadSheetData() {
    const statusEl = document.getElementById('status');
    statusEl.innerText = "📡 시트 데이터 로드 중...";
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=0`;

    try {
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.substring(47).slice(0, -2));
        const rows = json.table.rows;

        console.log("Raw Row Data:", rows[0]); // 첫 번째 데이터 로그 출력 (F12에서 확인 가능)

        allRawData = rows.filter(r => r.c && r.c[2]).map(r => {
            const team = r.c[0] ? String(r.c[0].v) : "미지정";
            const fullName = r.c[2] ? String(r.c[2].v) : "";
            const assignee = r.c[3] ? String(r.c[3].v) : "미지정";
            const qty = (r.c[4] && !isNaN(r.c[4].v)) ? parseInt(r.c[4].v) : 1;

            const parts = fullName.split('_');
            return { team, dateRaw: parts[0], taskName: parts.slice(1).join('_'), fullName, assignee, qty };
        });

        if (allRawData.length > 0 && allRawData[0].dateRaw === "YYMMDD") allRawData.shift();

        updateFilters();
        statusEl.innerText = `✅ 동기화 완료: ${allRawData.length}건 로드됨. (기간 필터를 확인하세요)`;
        processAndRender();
    } catch (e) {
        statusEl.innerText = "❌ 로드 실패: 시트 공유 설정을 확인하세요.";
        console.error(e);
    }
}

function updateFilters() {
    const tSel = document.getElementById('teamSelect');
    const cSel = document.getElementById('campaignSelect');
    const teams = new Set();
    const camps = new Set();
    
    allRawData.forEach(d => {
        teams.add(d.team);
        const c = d.taskName.split('_')[0];
        if (c) camps.add(c.trim());
    });

    const prevT = tSel.value;
    tSel.innerHTML = '<option value="all">전체 팀</option>';
    Array.from(teams).sort().forEach(t => tSel.innerHTML += `<option value="${t}">${t}</option>`);
    tSel.value = prevT || "all";

    const prevC = cSel.value;
    cSel.innerHTML = '<option value="all">전체 캠페인</option>';
    Array.from(camps).sort().forEach(c => cSel.innerHTML += `<option value="${c}">${c}</option>`);
    cSel.value = prevC || "all";
}

function processAndRender() {
    const start = new Date(document.getElementById('startDate').value);
    const end = new Date(document.getElementById('endDate').value);
    const sTeam = document.getElementById('teamSelect').value;
    const sCamp = document.getElementById('campaignSelect').value;
    end.setHours(23, 59, 59);

    const daily = {}, teamStats = {}, campStats = {};
    let filteredCount = 0;

    allRawData.forEach(item => {
        if (!/^\d{6}$/.test(item.dateRaw)) return;
        const dObj = new Date(`20${item.dateRaw.substring(0,2)}-${item.dateRaw.substring(2,4)}-${item.dateRaw.substring(4,6)}`);
        
        if (dObj < start || dObj > end) return;
        if (sTeam !== 'all' && item.team !== sTeam) return;
        const camp = item.taskName.split('_')[0].trim();
        if (sCamp !== 'all' && camp !== sCamp) return;

        filteredCount++;
        const dKey = dObj.toISOString().split('T')[0];
        daily[dKey] = (daily[dKey] || 0) + item.qty;
        teamStats[item.team] = (teamStats[item.team] || 0) + item.qty;

        if (!campStats[camp]) campStats[camp] = { t:0, g:0, m:0, k:0, y:0, n:0, e:0 };
        const s = campStats[camp];
        s.t += item.qty;
        const txt = item.fullName.toLowerCase();
        if (txt.includes('구글') || txt.includes('google') || txt.includes('gdn')) s.g += item.qty;
        else if (txt.includes('메타') || txt.includes('meta')) s.m += item.qty;
        else if (txt.includes('카카오') || txt.includes('kakao')) s.k += item.qty;
        else if (txt.includes('유튜브') || txt.includes('youtube') || txt.includes('yt')) s.y += item.qty;
        else if (txt.includes('네이버') || txt.includes('naver')) s.n += item.qty;
        else s.e += item.qty;
    });

    document.getElementById('status').innerText = `📊 필터링 결과: ${filteredCount}건의 데이터가 그래프에 표시 중입니다.`;
    renderUI(daily, teamStats, campStats);
}

function renderUI(daily, teams, camps) {
    if (dailyChart) dailyChart.destroy();
    const lbls = Object.keys(daily).sort();
    dailyChart = new Chart(document.getElementById('dailyChart'), {
        type: 'line',
        data: { labels: lbls, datasets: [{ label: '제작 건수', data: lbls.map(l => daily[l]), borderColor: '#4e73df', fill: true, tension: 0.1 }] },
        options: { maintainAspectRatio: false, plugins: { datalabels: { display: true, align: 'top' } } }
    });

    const tBody = document.getElementById('teamTableBody');
    tBody.innerHTML = '';
    Object.entries(teams).sort((a,b) => b[1]-a[1]).forEach(([n, c]) => tBody.innerHTML += `<tr><td>${n}</td><td><span class="badge">${c}</span></td></tr>`);

    const cBody = document.getElementById('campaignTableBody');
    cBody.innerHTML = '';
    Object.entries(camps).sort((a,b) => b[1].t-a[1].t).forEach(([n, s]) => {
        cBody.innerHTML += `<tr><td><span class="badge">${n}</span></td><td>${s.t}</td><td>${s.g}</td><td>${s.m}</td><td>${s.k}</td><td>${s.y}</td><td>${s.n}</td><td>${s.e}</td></tr>`;
    });
}

function exportToExcel() {
    const wb = XLSX.utils.table_to_book(document.getElementById("campaignTable"));
    XLSX.writeFile(wb, `제작리포트_${new Date().toISOString().split('T')[0]}.xlsx`);
}
</script>
</body>
</html>
