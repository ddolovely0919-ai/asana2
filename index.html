<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제작 물량 통합 트래킹 (MadUp DB)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #4e73df; --bg: #f4f7fc; --card: #ffffff; --excel: #217346; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1550px; margin: auto; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .config-grid { display: flex; justify-content: space-between; align-items: flex-end; gap: 20px; flex-wrap: wrap; }
        .filter-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; flex-grow: 1; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; font-weight: bold; color: #666; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 14px; color: white; }
        .btn-sync { background: var(--primary); }
        .btn-excel { background: var(--excel); }
        .dashboard-row { display: grid; grid-template-columns: 2.3fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-container { height: 480px; position: relative; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
        th { background: #f8f9fc; color: var(--primary); font-weight: 700; white-space: nowrap; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 5px; background: #eef2ff; color: var(--primary); font-weight: bold; }
        #status { font-weight: bold; margin-top: 15px; padding: 10px; border-radius: 8px; background: #fff; border: 1px solid #eee; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 style="margin-top:0;">📊 제작 물량 통합 트래킹 (스프레드시트 DB형)</h2>
        <div class="config-grid">
            <div class="filter-inputs">
                <div class="input-group"><label>팀 필터</label><select id="teamSelect" onchange="processAndRender()"><option value="all">전체 팀</option></select></div>
                <div class="input-group"><label>캠페인 필터</label><select id="campaignSelect" onchange="processAndRender()"><option value="all">전체 캠페인 보기</option></select></div>
                <div class="input-group"><label>시작일</label><input type="date" id="startDate" onchange="processAndRender()"></div>
                <div class="input-group"><label>종료일</label><input type="date" id="endDate" onchange="processAndRender()"></div>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn-sync" onclick="loadSheetData()">🔄 DB 데이터 동기화</button>
                <button class="btn-excel" onclick="exportToExcel()">📥 Excel 다운로드</button>
            </div>
        </div>
        <div id="status">연동 정보를 확인 중입니다...</div>
    </div>

    <div class="dashboard-row">
        <div class="card">
            <h2>📈 제작 요청 추이</h2>
            <div class="chart-container"><canvas id="dailyChart"></canvas></div>
        </div>
        <div class="card">
            <h2>🏢 팀별 제작 요약</h2>
            <table><thead><tr><th>팀명</th><th>건수</th></tr></thead><tbody id="teamTableBody"></tbody></table>
        </div>
    </div>

    <div class="card">
        <h2>📊 전체 캠페인 순위 및 매체별 수량 분석</h2>
        <table id="campaignTable">
            <thead>
                <tr>
                    <th>캠페인명</th>
                    <th>총 건수</th>
                    <th>메타(Meta)</th>
                    <th>카카오(Kakao)</th>
                    <th>유튜브(YT)</th>
                    <th>구글(GDN)</th>
                    <th>네이버</th>
                    <th>기타</th>
                </tr>
            </thead>
            <tbody id="campaignTableBody"></tbody>
        </table>
    </div>
</div>

<script>
Chart.register(ChartDataLabels);
// 💡 시트 ID 확인 필수: 1lx3nUPiUlBXcZAOktrTQ87Dm0amoQw1O-iVvBAGGiN4
const SHEET_ID = '1lx3nUPiUlBXcZAOktrTQ87Dm0amoQw1O-iVvBAGGiN4'; 
let allRawData = [];
let dailyChart;
let dailyDetails = {};

window.onload = () => {
    document.getElementById('startDate').value = "2026-02-01";
    document.getElementById('endDate').value = new Date().toISOString().split('T')[0];
    loadSheetData();
};

async function loadSheetData() {
    const statusEl = document.getElementById('status');
    statusEl.innerText = "📡 데이터를 긁어오는 중...";
    statusEl.style.color = "#4e73df";

    // 구글 시트 JSON 엔드포인트
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=0`;

    try {
        const res = await fetch(url);
        const text = await res.text();
        
        // 구글 응답 텍스트 파싱
        const match = text.match(/google\.visualization\.Query\.setResponse\((.*)\);/);
        if (!match) {
            throw new Error("데이터 형식을 읽을 수 없습니다. '웹에 게시' 설정을 확인하세요.");
        }

        const json = JSON.parse(match[1]);
        if (json.status === "error") {
            throw new Error("구글 시트 오류: " + json.errors[0].detailed_message);
        }

        const rows = json.table.rows;
        allRawData = rows.map(r => {
            if (!r.c || !r.c[4] || !r.c[4].v) return null;
            const fullTaskName = String(r.c[4].v);
            const dateMatch = fullTaskName.match(/^(\d{6})/);
            if (!dateMatch) return null;

            return {
                team: r.c[0] ? String(r.c[0].v) : "미지정",
                dateRaw: dateMatch[1],
                taskName: fullTaskName,
                assignee: r.c[5] ? String(r.c[5].v) : "미지정",
                campaign: r.c[6] ? String(r.c[6].v) : "기타"
            };
        }).filter(item => item !== null);

        if (allRawData.length === 0) {
            throw new Error("동기화는 성공했으나 유효한 데이터(YYMMDD 형식)가 없습니다.");
        }

        updateFilters();
        statusEl.innerText = `✅ 동기화 완료 (${allRawData.length}건 로드됨)`;
        statusEl.style.color = "#1cc88a";
        processAndRender();
    } catch (e) {
        statusEl.innerText = `❌ 오류: ${e.message}`;
        statusEl.style.color = "#e74a3b";
        console.error("Debug Details:", e);
    }
}

function updateFilters() {
    const tSel = document.getElementById('teamSelect');
    const cSel = document.getElementById('campaignSelect');
    const teams = new Set();
    const camps = new Set();
    allRawData.forEach(d => { teams.add(d.team); camps.add(d.campaign); });
    tSel.innerHTML = '<option value="all">전체 팀</option>';
    Array.from(teams).sort().forEach(t => tSel.innerHTML += `<option value="${t}">${t}</option>`);
    cSel.innerHTML = '<option value="all">전체 캠페인 보기</option>';
    Array.from(camps).sort().forEach(c => cSel.innerHTML += `<option value="${c}">${c}</option>`);
}

function processAndRender() {
    const start = new Date(document.getElementById('startDate').value);
    const end = new Date(document.getElementById('endDate').value);
    const sTeam = document.getElementById('teamSelect').value;
    const sCamp = document.getElementById('campaignSelect').value;
    end.setHours(23, 59, 59);

    const daily = {}, teamStats = {}, campStats = {};
    dailyDetails = {};

    allRawData.forEach(item => {
        const dObj = new Date(`20${item.dateRaw.substring(0,2)}-${item.dateRaw.substring(2,4)}-${item.dateRaw.substring(4,6)}`);
        if (dObj < start || dObj > end) return;
        if (sTeam !== 'all' && item.team !== sTeam) return;
        if (sCamp !== 'all' && item.campaign !== sCamp) return;

        const dKey = dObj.toISOString().split('T')[0];
        daily[dKey] = (daily[dKey] || 0) + 1;
        if (!dailyDetails[dKey]) dailyDetails[dKey] = {};
        const detailKey = `${item.campaign} (${item.assignee})`;
        dailyDetails[dKey][detailKey] = (dailyDetails[dKey][detailKey] || 0) + 1;

        teamStats[item.team] = (teamStats[item.team] || 0) + 1;

        if (!campStats[item.campaign]) campStats[item.campaign] = { t:0, m:0, k:0, y:0, g:0, n:0, e:0 };
        const s = campStats[item.campaign];
        s.t++;
        const txt = item.taskName.toLowerCase();
        if (txt.includes('메타') || txt.includes('meta')) s.m++;
        else if (txt.includes('카카오') || txt.includes('kakao')) s.k++;
        else if (txt.includes('유튜브') || txt.includes('youtube') || txt.includes('yt')) s.y++;
        else if (txt.includes('구글') || txt.includes('google') || txt.includes('gdn')) s.g++;
        else if (txt.includes('네이버') || txt.includes('naver')) s.n++;
        else s.e++;
    });

    renderUI(daily, teamStats, campStats);
}

function renderUI(daily, teams, camps) {
    if (dailyChart) dailyChart.destroy();
    const lbls = Object.keys(daily).sort();
    dailyChart = new Chart(document.getElementById('dailyChart'), {
        type: 'line',
        data: { labels: lbls, datasets: [{ label: '제작 건수', data: lbls.map(l => daily[l]), borderColor: '#4e73df', backgroundColor: 'rgba(78, 115, 223, 0.1)', fill: true, tension: 0.1 }] },
        options: { maintainAspectRatio: false, plugins: { datalabels: { display: true, align: 'top' } } }
    });

    const tBody = document.getElementById('teamTableBody');
    tBody.innerHTML = '';
    Object.entries(teams).sort((a,b) => b[1]-a[1]).forEach(([n, c]) => tBody.innerHTML += `<tr><td><strong>${n}</strong></td><td><span class="badge">${c}건</span></td></tr>`);

    const cBody = document.getElementById('campaignTableBody');
    cBody.innerHTML = '';
    Object.entries(camps).sort((a,b) => b[1].t-a[1].t).forEach(([n, s]) => {
        cBody.innerHTML += `<tr><td><span class="badge">${n}</span></td><td><strong>${s.t}</strong></td><td>${s.m}</td><td>${s.k}</td><td>${s.y}</td><td>${s.g}</td><td>${s.n}</td><td>${s.e}</td></tr>`;
    });
}

function exportToExcel() {
    const wb = XLSX.utils.table_to_book(document.getElementById("campaignTable"));
    XLSX.writeFile(wb, `제작통계리포트_${new Date().toISOString().split('T')[0]}.xlsx`);
}
</script>
</body>
</html>
